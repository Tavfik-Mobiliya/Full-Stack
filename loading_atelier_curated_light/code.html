<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        
        @keyframes subtle-rotation {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .animate-loader {
            animation: subtle-rotation 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .fade-in-out {
            animation: fadeInOut 4s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; transform: translateY(8px); }
            20%, 80% { opacity: 0.6; transform: translateY(0); }
        }

        .glass-overlay {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
    </style>

<body class="bg-surface text-on-surface selection:bg-primary-container selection:text-on-primary-container overflow-hidden">

<div class="absolute -top-1/4 -left-1/4 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-1/4 -right-1/4 w-[800px] h-[800px] bg-secondary/5 rounded-full blur-[120px]"></div>
</div>
<!-- Main Loading Section -->
<div class="relative z-10 flex flex-col items-center gap-12 text-center max-w-lg px-margin-mobile">
<!-- Circular Loader Component -->
<div class="relative group">
<div class="absolute inset-0 bg-primary/10 blur-2xl rounded-full scale-75 group-hover:scale-100 transition-transform duration-700"></div>
<!-- Note: The loader image contains the gold arc which we maintain -->
<img alt="Atelier Curated Loader" class="w-24 h-24 relative z-10 animate-loader object-contain brightness-100 contrast-100" src="https://lh3.googleusercontent.com/aida/AP1WRLvs2UFOKTHKeaCByMT8wyhn6LHRs1_YAVx2yT4c_h_FRnbO518jb8XFEN0U7GTLnYiXkkhYHuUVvwqqc-F55GGsziyka40cREEU40XDv44k8x-t6MPh9ZjPDMFxhr3KBI_NPP6d1sIfTDz0LFCiVqXmcG8eh4stsWyWaZ3DijGoJ4jMU9aFAY9o6jN-FlSDOzUFvbTBLJEOQlJG5diJHCnAYvmyBp3LstNL4Vpxi84QMY76KqwDG8anVf7D"/>
</div>

<div class="space-y-6">
<h1 class="font-display-lg text-on-surface tracking-[0.2em] uppercase transition-all duration-1000 ease-in-out">
                    ATELIER CURATED
                </h1>
<div class="h-6 overflow-hidden">
<p class="font-body-md text-on-surface-variant italic tracking-widest fade-in-out" id="dynamic-phrase">Crafting bespoke environments...</p>
</div>
</div>
<!-- Minimalist Detail Lines -->
<div class="w-px h-16 bg-gradient-to-b from-primary/60 to-transparent"></div>
</div>
<!-- Layout Frame Elements -->
<div class="fixed top-margin-desktop left-margin-desktop border-l border-t border-outline-variant/60 w-12 h-12 hidden md:block"></div>
<div class="fixed top-margin-desktop right-margin-desktop border-r border-t border-outline-variant/60 w-12 h-12 hidden md:block"></div>
<div class="fixed bottom-margin-desktop left-margin-desktop border-l border-b border-outline-variant/60 w-12 h-12 hidden md:block"></div>
<div class="fixed bottom-margin-desktop right-margin-desktop border-r border-b border-outline-variant/60 w-12 h-12 hidden md:block"></div>
<!-- Side Concierge / Floating Elements (Hidden on mobile) -->

<button class="p-3 text-on-surface-variant hover:text-primary transition-colors duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">chat</span>
</button>

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">menu_book</span>

<p class="font-label-caps text-on-surface-variant/70 tracking-[0.3em] uppercase">
                ESTABLISHED MMXXIV — ARCHITECTURAL EXCELLENCE
            </p>
</div>
</main>
<script>
        // Smooth phrase cycling
        const phrases = [
            "Curating your architectural vision...",
            "Sculpting light and shadow...",
            "Defining timeless elegance...",
            "Crafting bespoke environments...",
            "Harmonizing space and form..."
        ];
        
        let index = 0;
        const phraseElement = document.getElementById('dynamic-phrase');

        setInterval(() => {
            index = (index + 1) % phrases.length;
            
            // Sync text change with the middle of the fade animation
            setTimeout(() => {
                phraseElement.textContent = phrases[index];
            }, 2000); 
            
        }, 4000);

        // Interaction micro-movement
        document.addEventListener('mousemove', (e) => {
            const amount = 20;
            const x = (e.clientX / window.innerWidth - 0.5) * amount;
            const y = (e.clientY / window.innerHeight - 0.5) * amount;
            
            document.querySelectorAll('.animate-loader').forEach(el => {
                el.style.transform = `rotate(0deg) translate(${x}px, ${y}px)`;
            });
        });
    </script>
